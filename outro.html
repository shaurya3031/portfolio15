<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powered by BlueBracket</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Syne', sans-serif;
    overflow: hidden;
  }

  .outro-container {
    text-align: center;
    opacity: 0;
    transform: scale(0.9);
    animation: revealOutro 1s 0.3s ease forwards;
  }

  .logo-wrapper {
    width: 200px;
    height: 200px;
    border-radius: 30px;
    overflow: hidden;
    margin: 0 auto 2rem;
    box-shadow: 0 20px 60px rgba(59, 130, 180, 0.25), 0 0 0 1px rgba(255,255,255,0.05);
    animation: floatLogo 3s ease-in-out infinite;
  }
  .logo-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .powered-text {
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 0.75rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.8s ease forwards;
  }

  .brand-name {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #3b82b4, #5ba3d4, #2d6a8f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation: fadeUp 0.8s 1s ease forwards;
  }

  .brand-tagline {
    font-size: 1rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.15em;
    margin-top: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 1.2s ease forwards;
  }

  /* Ambient glow */
  .glow {
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0;
    animation: glowIn 2s 0.5s ease forwards;
    pointer-events: none;
  }
  .glow.g1 {
    top: 30%; left: 30%;
    background: rgba(59, 130, 180, 0.12);
  }
  .glow.g2 {
    bottom: 20%; right: 25%;
    background: rgba(45, 106, 143, 0.08);
  }

  @keyframes revealOutro {
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes floatLogo {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes glowIn {
    to { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="glow g1"></div>
  <div class="glow g2"></div>

  <div class="outro-container">
    <div class="logo-wrapper">
      <img src="images/bluebracket_logo.jpg" alt="BlueBracket Logo">
    </div>
    <div class="powered-text">Powered by</div>
    <div class="brand-name">BlueBracket</div>
    <div class="brand-tagline">Web Development</div>
  </div>
</body>
</html>
